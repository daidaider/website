<!DOCTYPE html>
<html lang="zh-TW">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>苗栗公館紅棗採果地圖</title>
    <style>
        :root {
            --primary-color: #8B0000;
            --accent-color: #D32F2F;
            --bg-color: #FDFBF7;
            --text-color: #333;
        }
        body {
            font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, "Helvetica Neue", Arial, "Microsoft JhengHei", sans-serif;
            background-color: var(--bg-color);
            color: var(--text-color);
            margin: 0;
            padding: 0;
        }
        /* 彈窗樣式 */
        .modal-overlay {
            position: fixed;
            top: 0; left: 0; width: 100%; height: 100%;
            background: rgba(0,0,0,0.7);
            display: flex; justify-content: center; align-items: center;
            z-index: 9999;
        }
        .modal-box {
            background: white;
            padding: 30px;
            border-radius: 12px;
            max-width: 500px;
            width: 90%;
            text-align: center;
            box-shadow: 0 5px 15px rgba(0,0,0,0.3);
        }
        .modal-box h2 { color: var(--accent-color); margin-top: 0; }
        .modal-box p { font-size: 1.1rem; line-height: 1.6; color: #555; }
        .modal-btn-group {
            display: flex; gap: 15px; margin-top: 25px; justify-content: center;
        }
        .btn {
            padding: 12px 24px; border: none; border-radius: 6px;
            font-size: 1rem; font-weight: bold; cursor: pointer; transition: 0.2s;
            text-decoration: none;
        }
        .btn-primary { background-color: var(--primary-color); color: white; }
        .btn-primary:hover { background-color: #6A0000; }
        .btn-secondary { background-color: #E0E0E0; color: #333; }
        .btn-secondary:hover { background-color: #CCCCCC; }

        /* 主網頁樣式 */
        .container { max-width: 1200px; margin: 0 auto; padding: 20px; }
        header { text-align: center; padding: 40px 0 20px; }
        header h1 { color: var(--primary-color); margin: 0; font-size: 2.5rem; }
        
        /* 守則警告標語 */
        .rule-banner {
            background-color: #FFEBEE;
            border-left: 6px solid var(--accent-color);
            padding: 15px 20px;
            border-radius: 4px;
            margin-bottom: 30px;
        }
        .rule-banner h3 { margin: 0 0 10px 0; color: var(--accent-color); }
        .rule-banner ul { margin: 0; padding-left: 20px; font-size: 1.1rem; line-height: 1.6; }

        /* 卡片與列表樣式 */
        .grid {
            display: grid;
            grid-template-columns: repeat(auto-fill, minmax(300px, 1fr));
            gap: 20px;
        }
        .farm-card {
            background: white; border-radius: 8px; padding: 20px;
            box-shadow: 0 2px 8px rgba(0,0,0,0.06);
            border: 1px solid #EAEAEA;
            display: flex; flex-direction: column; justify-content: space-between;
        }
        .farm-name { font-size: 1.3rem; font-weight: bold; color: var(--primary-color); margin-top: 0; }
        .farm-info { font-size: 0.95rem; margin: 8px 0; color: #666; }
        .farm-note {
            background: #F9F9F9; padding: 8px 12px; border-radius: 4px;
            font-size: 0.9rem; color: #555; margin-top: 10px; border-left: 3px solid #DDD;
        }
        .action-btns { display: flex; gap: 10px; margin-top: 15px; }
        .action-btn {
            flex: 1; text-align: center; padding: 8px; border-radius: 4px;
            font-size: 0.9rem; text-decoration: none; font-weight: bold;
        }
        .btn-map { background: #E3F2FD; color: #1E88E5; }
        .btn-map:hover { background: #BBDEFB; }
        .btn-fb { background: #E8F5E9; color: #43A047; }
        .btn-fb:hover { background: #C8E6C9; }
        
        /* 其他景點空白頁樣式 */
        .hidden { display: none !important; }
        .placeholder-page { text-align: center; padding: 100px 20px; }
    </style>
</head>
<body>

    <!-- 入口層：颱風彈窗提示 -->
    <div id="welcome-modal" class="modal-overlay">
        <div class="modal-box">
            <h2>⚠️ 採果特別公告</h2>
            <p>受巴威颱風影響，目前紅棗有許多裂果，採果體驗可能沒有很好，敬請見諒。</p>
            <div class="modal-btn-group">
                <button class="btn btn-primary" onclick="goToPage('farm')">我依然要採果</button>
                <button class="btn btn-secondary" onclick="goToPage('other')">我想看看其他景點</button>
            </div>
        </div>
    </div>

    <!-- 第一層：主採果網站 -->
    <div id="farm-page" class="container hidden">
        <header>
            <h1>苗栗公館紅棗採果名單</h1>
        </header>

        <!-- ⚠️ 頂部提醒守則 -->
        <div class="rule-banner">
            <h3>園區重要守則</h3>
            <ul>
                <li>☔ <strong>請勿撐傘</strong>（避免雨傘骨架戳傷紅棗或樹枝環境）</li>
                <li>🚫 <strong>請勿邊採邊吃</strong>（請維護園區衛生與農民心血）</li>
            </ul>
        </div>

        <!-- 棗農名單卡片區 -->
        <div class="grid" id="farm-list">
            <!-- 這裡會自動填入資料 -->
        </div>
    </div>

    <!-- 第二層：其他景點頁 (暫時空白) -->
    <div id="other-page" class="container placeholder-page hidden">
        <h2 style="color: #666;">周邊精選景點規劃中</h2>
        <p style="color: #999;">更多精彩行程即將上線，敬請期待！</p>
        <button class="btn btn-secondary" onclick="backToHome()">返回公告</button>
    </div>

    <script>
        // 從 Excel 整理出來的棗農數據
        const farms = [
            { name: "棗三枚紅棗園", tel: "0932-659198", addr: "苗栗縣公館鄉館東村十鄰145之5號", fb: "https://www.facebook.com/profile.php?id=61554408872632", note: "" },
            { name: "渤海紅棗園", tel: "0935761370", addr: "苗栗縣公館鄉石墻村4鄰110-6號", fb: "https://www.facebook.com/profile.php?id=100054410550358", note: "入園採果每台斤150元，早上6點至下午6點止" },
            { name: "宏昌紅棗園", tel: "0910517224", addr: "苗栗縣公館鄉石圍牆村9鄰186-1號", fb: "", note: "" },
            { name: "吉秀紅棗園", tel: "0910233625", addr: "苗栗縣公館鄉石墻村3鄰364-9號", fb: "https://www.facebook.com/profile.php?id=100070174121332", note: "入場180元可以帶一斤紅棗" },
            { name: "安哥紅棗園", tel: "無電話資料", addr: "苗栗縣公館鄉石圍牆村13鄰281-3號", fb: "", note: "" },
            { name: "逢林紅棗園", tel: "無電話資料", addr: "苗栗縣公館鄉石圍牆村13鄰270號", fb: "", note: "" },
            { name: "迪大紅棗園", tel: "0937-221917", addr: "苗栗縣公館鄉石圍牆村4鄰110之1號", fb: "", note: "" },
            { name: "自慢田園", tel: "0911-865598", addr: "苗栗縣公館鄉福基村132-10號", fb: "", note: "" },
            { name: "玉順紅棗園", tel: "0912-861-160", addr: "苗栗縣公館鄉石墻村6鄰號131-5號 363", fb: "https://www.facebook.com/profile.php?id=100064584013982", note: "" },
            { name: "徐家紅棗果園", tel: "0936-589-546", addr: "苗栗縣公館鄉石墻大道234-1號", fb: "https://www.facebook.com/likoohsu", note: "230元入場，可抵免商品" },
            { name: "錦城紅棗園", tel: "03 722 8560", addr: "苗栗縣公館鄉中義村270之1號", fb: "https://www.facebook.com/p/%E9%8C%A6%E5%9F%8E%E7%B4%85%E6%A3%97%E5%9C%92-100065280858321/", note: "" },
            { name: "迴哥紅棗園", tel: "0933171869", addr: "苗栗縣公館鄉石墻村1鄰29-2號", fb: "https://www.facebook.com/FagarJujubeGarden", note: "Line : mel5888" },
            { name: "棗美金", tel: "0933515916", addr: "苗栗縣公館鄉13鄰", fb: "https://www.facebook.com/jiannming.liu", note: "" },
            { name: "來來紅棗園", tel: "0910 851 153", addr: "", fb: "", note: "" }
        ];

        // 動態生成卡片
        const container = document.getElementById('farm-list');
        farms.forEach(farm => {
            if(!farm.name) return; // 略過空白
            
            let card = document.createElement('div');
            card.className = 'farm-card';
            
            // 地圖與FB按鈕邏輯
            let mapBtn = farm.addr ? `<a class="action-btn btn-map" href="https://www.google.com/maps/search/?api=1&query=${encodeURIComponent(farm.addr)}" target="_blank">🗺️ 地圖導航</a>` : `<span class="action-btn btn-map" style="opacity:0.4; pointer-events:none;">無地址</span>`;
            let fbBtn = farm.fb ? `<a class="action-btn btn-fb" href="${farm.fb}" target="_blank">🌐 棗園 FB</a>` : '';
            let noteBlock = farm.note ? `<div class="farm-note">${farm.note}</div>` : '';

            card.innerHTML = `
                <div>
                    <div class="farm-name">${farm.name}</div>
                    <div class="farm-info">📞 電話：${farm.tel}</div>
                    <div class="farm-info">📍 地址：${farm.addr || '暫無詳細地址'}</div>
                    ${noteBlock}
                </div>
                <div class="action-btns">
                    ${mapBtn}
                    ${fbBtn}
                </div>
            `;
            container.appendChild(card);
        });

        // 路由切換邏輯
        function goToPage(page) {
            document.getElementById('welcome-modal').classList.add('hidden');
            if (page === 'farm') {
                document.getElementById('farm-page').classList.remove('hidden');
            } else if (page === 'other') {
                document.getElementById('other-page').classList.remove('hidden');
            }
        }

        function backToHome() {
            document.getElementById('farm-page').classList.add('hidden');
            document.getElementById('other-page').classList.add('hidden');
            document.getElementById('welcome-modal').classList.remove('hidden');
        }
    </script>
</body>
</html>
